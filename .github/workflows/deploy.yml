name: Build and Push to Docker Hub

## We need to tell when it will run
on:
  push:
    branches: ["main"] ## Everytime I push to main branch

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start Services (Backend + Frontend)
        env:
          SUPABASE_URL: ${{secrets.SUPABASE_URL}}
          SUPABASE_SERVICE_ROLE_KEY: ${{secrets.SUPABASE_SERVICE_ROLE_KEY}}
          NEXT_PUBLIC_SUPABASE_URL: ${{secrets.NEXT_PUBLIC_SUPABASE_URL}}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY}}
          ML_INTERNAL_SECRET: ${{secrets.ML_INTERNAL_SECRET}}
          ML_URL: ${{secrets.ML_URL}}
          REFRESH_TOKEN_SECRET: ${{secrets.REFRESH_TOKEN_SECRET}}
          ACCESS_TOKEN_SECRET: ${{secrets.ACCESS_TOKEN_SECRET}}

        run: |
          # Pull the latest backend
          docker pull prakhar869/discusso-backend:latest
          docker compose up -d

      - name: Run PLaywright tests
        run: npx playwright test

      - name: Upload Playwright Report (if failed)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-and-push:
    needs: e2e-tests
    runs-on: ubuntu-latest

    steps:
      ## First copy the copy from github to VM ubuntu
      - name: Checkout code
        uses: actions/checkout@v4

        ## Then log in to docker hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

        ## Setting up 'Buildx' for building docker image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

        ## Build and Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: prakhar869/discusso-frontend:latest
