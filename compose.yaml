services:
  # --- THE BACKEND SERVICE ---
  fastapi-backend:
    image: prakhar869/discusso-backend:latest
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"] # Adjust to your health route
      interval: 10s
      timeout: 5s
      retries: 5
    container_name: discusso-api
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ML_INTERNAL_SECRET=${ML_INTERNAL_SECRET}
    networks:
      - discusso-net

  # --- THE FRONTEND SERVICE ---
  nextjs-frontend:
    build: .
    container_name: discusso-web
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - ML_INTERNAL_SECRET=${ML_INTERNAL_SECRET}
      - ML_URL=${ML_URL}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
    networks:
      - discusso-net
    depends_on:
      fastapi-backend:
        condition: service_healthy

# --- THE SHARED NETWORK ---
networks:
  discusso-net:
    driver: bridge
